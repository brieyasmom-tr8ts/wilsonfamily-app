<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Wilson Family">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Blue gradient background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#shine)"/>

  <!-- W letterform -->
  <text x="256" y="340" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="800" font-size="320" fill="white" opacity="0.95">W</text>

  <!-- Small sparkle accent -->
  <g transform="translate(390 130) scale(0.35)">
    <path d="M 0 -80 C 12 -28 12 -28 80 0 C 12 28 12 28 0 80 C -12 28 -12 28 -80 0 C -12 -28 -12 -28 0 -80 Z"
          fill="#f59e0b"/>
    <path d="M 0 -48 C 7 -17 7 -17 48 0 C 7 17 7 17 0 48 C -7 17 -7 17 -48 0 C -7 -17 -7 -17 0 -48 Z"
          fill="#f59e0b" opacity="0.8" transform="rotate(45)"/>
  </g>
</svg>
