<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scrapbook · The Wilson Family</title>
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-title" content="Wilson Family" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css" />
<link rel="stylesheet" href="/scrapbook/scrapbook.css" />
</head>
<body>

<header class="app-header">
  <a href="/" class="brand">
    <span class="brand-mark">✦</span>
    <span class="brand-name">The Wilson Family</span>
    <span class="brand-room">/ Scrapbook</span>
  </a>
  <div class="user-chip">
    <span id="user-emoji">🌱</span>
    <span id="user-name"></span>
    <button id="signout-btn" class="link-btn">Sign out</button>
  </div>
</header>

<main class="scrap-main">
  <div class="scrap-toolbar">
    <button id="add-photo-btn" class="btn-primary">+ Add photo</button>
    <div class="filter-wrap">
      <select id="filter-member">
        <option value="">Everyone</option>
      </select>
    </div>
  </div>

  <div id="photo-grid">
    <div class="book">
      <div class="book-empty">
        <div class="book-empty-icon">📸</div>
        <div class="book-empty-text">Loading...</div>
      </div>
    </div>
  </div>
</main>

<!-- ADD PHOTO MODAL -->
<div id="modal-photo" class="modal hidden">
  <div class="modal-backdrop" data-close-photo></div>
  <div class="modal-card">
    <button class="modal-close" data-close-photo aria-label="Close">&times;</button>
    <p class="eyebrow">Add to scrapbook</p>
    <h3 class="modal-title">A new <em>memory</em></h3>
    <form id="photo-form" class="modal-form">
      <div class="upload-area">
        <input id="photo-file" type="file" accept="image/*" class="file-input" required />
        <label for="photo-file" class="upload-label" id="photo-upload-label">
          <span class="upload-icon">📸</span>
          <span>Take or choose a photo</span>
        </label>
        <img id="photo-thumb" class="photo-thumb hidden" />
      </div>
      <label><span>Caption <em>(optional)</em></span><input id="photo-caption" type="text" maxlength="300" placeholder="What's happening here?" /></label>
      <label><span>Date <em>(optional)</em></span><input id="photo-date" type="date" /></label>
      <label>
        <span>Who's in this photo?</span>
        <div id="tag-grid" class="tag-grid"></div>
      </label>
      <p id="photo-error" class="form-error hidden"></p>
      <p id="photo-status" class="upload-status hidden"></p>
      <button type="submit" class="btn-primary">Add to scrapbook</button>
    </form>
  </div>
</div>

<script src="/scrapbook/scrapbook.js"></script>
</body>
</html>
