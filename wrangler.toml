name = "wilsonfamily-app"
compatibility_date = "2024-12-01"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "wilsonfamily-db"
database_id = "253eb4a2-7cee-4a1d-b172-91d3b656b1b3"

[[r2_buckets]]
bucket_name = "wilsonfamily-media"
binding = "MEDIA"

[vars]
# Update this to your deployed URL after first deploy.
# For local dev: http://localhost:8788
# For production: https://wilsonfamily.app
APP_URL = "https://wilsonfamily.app"
# Family join code — give this to family members so they can sign up
FAMILY_CODE = "iamawilson"
# Set FROM_EMAIL via the Cloudflare dashboard or wrangler secret
# Set POSTMARK_API_KEY via wrangler secret put POSTMARK_API_KEY
